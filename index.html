<script>
    const NOTES_KEY   = "smart_notes_v1";
    const API_KEY_KEY = "smart_notes_api_key";

    function getApiKey() {
      return localStorage.getItem(API_KEY_KEY) || "";
    }

    function loadNotes() {
      try { return JSON.parse(localStorage.getItem(NOTES_KEY)) || {}; }
      catch { return {}; }
    }

    function saveNotes(notes) {
      localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
    }

    function timeAgo(ts) {
      const diff = Math.floor((Date.now() - ts) / 1000);
      if (diff < 60) return "just now";
      if (diff < 3600) return Math.floor(diff / 60) + "m ago";
      if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
      return Math.floor(diff / 86400) + "d ago";
    }

    /* ── SCREENS ── */
    function showSettings() {
      document.getElementById("mainScreen").classList.remove("active");
      document.getElementById("settingsScreen").classList.add("active");
      const existing = getApiKey();
      if (existing) {
        document.getElementById("keyInput").value = existing;
        document.getElementById("keyStatus").textContent = "Key is saved on this device";
        document.getElementById("keyStatus").className = "key-status saved";
      }
    }

    function showMain() {
      document.getElementById("settingsScreen").classList.remove("active");
      document.getElementById("mainScreen").classList.add("active");
      checkKeyBanner();
      renderNotes();
    }

    /* ── API KEY MANAGEMENT ── */
    function saveKey() {
      const val = document.getElementById("keyInput").value.trim();
      if (!val) { alert("Please paste your API key first."); return; }
      localStorage.setItem(API_KEY_KEY, val);
      document.getElementById("keyStatus").textContent = "✓ Key saved on this device!";
      document.getElementById("keyStatus").className = "key-status saved";
    }

    function clearKey() {
      if (!confirm("Remove your API key from this device?")) return;
      localStorage.removeItem(API_KEY_KEY);
      document.getElementById("keyInput").value = "";
      document.getElementById("keyStatus").textContent = "Key removed.";
      document.getElementById("keyStatus").className = "key-status cleared";
    }

    function clearAllNotes() {
      if (!confirm("Delete ALL notes? This cannot be undone.")) return;
      localStorage.removeItem(NOTES_KEY);
      renderNotes();
      showMain();
    }

    function checkKeyBanner() {
      const banner = document.getElementById("noKeyBanner");
      banner.style.display = getApiKey() ? "none" : "block";
    }

    /* ── RENDER NOTES ── */
    function renderNotes() {
      const notes = loadNotes();
      const area  = document.getElementById("notesArea");
      const cats  = Object.keys(notes);

      if (cats.length === 0) {
        area.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <p>No notes yet.<br>Add your first one above!</p>
          </div>`;
        return;
      }

      area.innerHTML = cats.map(cat => {
        const items = notes[cat];
        return `
          <div class="category-block">
            <div class="cat-header">
              <span class="cat-title">${cat}</span>
              <span class="cat-count">${items.length} note${items.length > 1 ? "s" : ""}</span>
            </div>
            ${items.map((item, i) => `
              <div class="note-item">
                <div style="flex:1">
                  <div class="note-text">${item.text}</div>
                  <div class="note-time">${timeAgo(item.ts)}</div>
                </div>
                <button class="del-btn" onclick="deleteNote('${cat}', ${i})">&#x2715;</button>
              </div>`).join("")}
          </div>`;
      }).join("");
    }

    function deleteNote(cat, idx) {
      const notes = loadNotes();
      notes[cat].splice(idx, 1);
      if (notes[cat].length === 0) delete notes[cat];
      saveNotes(notes);
      renderNotes();
    }

    /* ── AI CATEGORISATION ── */
    async function getCategory(noteText, existingCategories) {
      const apiKey = getApiKey();
      if (!apiKey) throw new Error("No API key. Tap ⚙️ to add your Gemini API key.");

      const catList = existingCategories.length > 0
        ? `Existing categories: ${existingCategories.join(", ")}.`
        : "There are no existing categories yet.";

      const prompt = `You are a note organizer. ${catList}
The user just wrote this note: "${noteText}"
Decide which category this note belongs to.
- If it fits an existing category, return that exact category name.
- If it does not fit any, create a short new category name (2-3 words max).
- Return ONLY the category name. Nothing else.`;

      // CHANGED: Using gemini-1.5-flash for better free-tier availability
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.1, maxOutputTokens: 20 }
          })
        }
      );

      if (!res.ok) {
        const errData = await res.json();
        // Friendly error handling for the "Limit 0" or Quota issues
        if (res.status === 429) {
          throw new Error("API is busy or quota reached. Please try again in 30 seconds.");
        }
        throw new Error(errData?.error?.message || "Connection Error");
      }

      const data = await res.json();
      const raw  = data?.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!raw) throw new Error("AI could not categorize this. Try again.");

      return raw.trim().replace(/[.!?]$/, "");
    }

    /* ── SAVE NOTE ── */
    async function saveNote() {
      const input  = document.getElementById("noteInput");
      const btn    = document.getElementById("saveBtn");
      const status = document.getElementById("status");
      const text   = input.value.trim();
      if (!text) return;

      btn.disabled = true;
      status.className = "";
      status.textContent = "AI is sorting your note...";

      try {
        const notes        = loadNotes();
        const existingCats = Object.keys(notes);
        const category     = await getCategory(text, existingCats);

        if (!notes[category]) notes[category] = [];
        notes[category].unshift({ text, ts: Date.now() });
        saveNotes(notes);

        input.value = "";
        status.className = "success";
        status.textContent = "Filed under: " + category;
        setTimeout(() => { if(status.className === "success") status.textContent = ""; }, 3000);
        renderNotes();
      } catch (e) {
        status.className = "error";
        status.textContent = e.message;
      }

      btn.disabled = false;
    }

    /* ── ENTER KEY ── */
    document.getElementById("noteInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); saveNote(); }
    });

    /* ── INIT ── */
    checkKeyBanner();
    renderNotes();
  </script>
